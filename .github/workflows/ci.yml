name: SDK CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  typescript:
    strategy:
      matrix:
        node: ['20.3', '22']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run

  python:
    strategy:
      matrix:
        python: ['3.10', '3.12']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install build pytest
      - run: PYTHONPATH=python python -m pytest python/tests
      - run: python -m build python
