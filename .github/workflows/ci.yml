name: SDK CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install build pytest
      - run: PYTHONPATH=python python -m pytest python/tests
      - run: python -m build python
